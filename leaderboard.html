<!DOCTYPE html>
<html lang="ru">
<head>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Gray Squad — Лидерборд</title>
<link rel="stylesheet" href="assets/style.css">
<style>
/* ── Layout ── */
.lb-layout{display:grid;grid-template-columns:1fr 280px;gap:1.75rem;align-items:start;}
.lb-left,.lb-right{display:flex;flex-direction:column;gap:1.5rem;}

/* ── Podium ── */
.podium{display:grid;grid-template-columns:1fr 1.15fr 1fr;gap:.75rem;align-items:end;}
.pod{border-radius:14px;overflow:hidden;display:flex;flex-direction:column;align-items:center;padding:1.25rem 1rem 1rem;position:relative;transition:transform .25s;cursor:pointer;text-decoration:none;color:inherit;}
.pod:hover{transform:translateY(-4px);}
.pod.p1{background:linear-gradient(180deg,rgba(255,193,7,.12),rgba(255,193,7,.04));border:1px solid rgba(255,193,7,.3);}
.pod.p2{background:linear-gradient(180deg,rgba(192,192,192,.08),rgba(192,192,192,.02));border:1px solid rgba(192,192,192,.2);}
.pod.p3{background:linear-gradient(180deg,rgba(205,127,50,.08),rgba(205,127,50,.02));border:1px solid rgba(205,127,50,.2);}
.pod::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.pod.p1::before{background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.pod.p2::before{background:linear-gradient(90deg,transparent,#C0C0C0,transparent);}
.pod.p3::before{background:linear-gradient(90deg,transparent,#CD7F32,transparent);}
.pod-crown{font-size:1.5rem;margin-bottom:.4rem;}
.pod-av{width:60px;height:60px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:var(--font-title);font-size:1.4rem;font-weight:700;color:#fff;margin-bottom:.65rem;position:relative;overflow:hidden;}
.pod-av img{width:100%;height:100%;object-fit:cover;}
.pod.p1 .pod-av{width:72px;height:72px;}
.pod-pos{position:absolute;bottom:-6px;right:-6px;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:.65rem;font-weight:700;border:2px solid var(--bg);}
.pod.p1 .pod-pos{background:var(--gold);color:#000;}
.pod.p2 .pod-pos{background:#C0C0C0;color:#000;}
.pod.p3 .pod-pos{background:#CD7F32;color:#000;}
.pod-name{font-family:var(--font-title);font-size:1rem;font-weight:700;margin-bottom:3px;text-align:center;}
.pod.p1 .pod-name{font-size:1.1rem;}
.pod-score{font-family:var(--font-mono);font-size:.8rem;font-weight:700;margin-bottom:4px;}
.pod.p1 .pod-score{color:var(--gold);font-size:.88rem;}
.pod.p2 .pod-score{color:#C0C0C0;}
.pod.p3 .pod-score{color:#CD7F32;}
.pod-base{font-family:var(--font-mono);font-size:.58rem;color:var(--text-dim);margin-bottom:6px;}
.pod-rank-badge{font-family:var(--font-mono);font-size:.62rem;padding:2px 9px;border-radius:4px;}

/* ── Controls ── */
.lb-controls{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;}
.sw{flex:1;min-width:180px;position:relative;}
.si{position:absolute;left:.8rem;top:50%;transform:translateY(-50%);font-size:.85rem;color:var(--text-dim);pointer-events:none;}
.si-inp{width:100%;padding:.55rem .8rem .55rem 2.3rem;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font-body);font-size:.88rem;outline:none;transition:border-color .2s;}
.si-inp:focus{border-color:rgba(220,53,69,.4);}
.si-inp::placeholder{color:var(--text-dim);}
.sort-btn{display:flex;align-items:center;gap:6px;padding:.52rem .85rem;font-family:var(--font-title);font-size:.82rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;background:var(--surface);border:1px solid var(--border);color:var(--text-dim);border-radius:8px;cursor:pointer;transition:all .2s;flex-shrink:0;}
.sort-btn:hover{border-color:rgba(255,255,255,.15);color:var(--text);}
.sort-btn.active{background:rgba(220,53,69,.1);border-color:rgba(220,53,69,.35);color:var(--text);}

/* ── Table ── */
.lb-table{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.lb-col-head{display:grid;grid-template-columns:50px 1fr 110px 80px 90px 110px;padding:.6rem 1rem;border-bottom:1px solid var(--border);font-family:var(--font-mono);font-size:.6rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.1em;}
.lb-col-head span{text-align:center;cursor:pointer;user-select:none;transition:color .2s;padding:3px 0;}
.lb-col-head span:hover{color:var(--text);}
.lb-col-head span.sa{color:var(--red);}
.lb-col-head span:nth-child(2){text-align:left;}
.lb-row{display:grid;grid-template-columns:50px 1fr 110px 80px 90px 110px;align-items:center;padding:.7rem 1rem;border-bottom:1px solid var(--border);transition:background .15s;cursor:pointer;text-decoration:none;color:inherit;}
.lb-row:last-child{border-bottom:none;}
.lb-row:hover{background:rgba(255,255,255,.03);}
.lb-row.me{background:rgba(220,53,69,.05);}
.lb-row.me:hover{background:rgba(220,53,69,.08);}
.lb-row.top1{background:rgba(255,193,7,.04);}
.lb-row.top2{background:rgba(192,192,192,.025);}
.lb-row.top3{background:rgba(205,127,50,.025);}
.lb-pos{font-family:var(--font-mono);font-size:.85rem;color:var(--text-dim);text-align:center;font-weight:700;}
.lb-player{display:flex;align-items:center;gap:10px;min-width:0;}
.lb-av{width:32px;height:32px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:#fff;overflow:hidden;}
.lb-av img{width:100%;height:100%;object-fit:cover;}
.lb-name{font-weight:700;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lb-name.me-name{color:var(--red);}
.lb-title-tag{font-family:var(--font-mono);font-size:.6rem;color:var(--gold);}
.lb-cell{font-family:var(--font-mono);font-size:.82rem;text-align:center;}

/* ELO cell with breakdown on hover */
.elo-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;position:relative;}
.elo-score{font-family:var(--font-title);font-size:.92rem;font-weight:700;}
.elo-base{font-family:var(--font-mono);font-size:.58rem;color:var(--text-dim);}
.elo-tooltip{display:none;position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--bg3,#141418);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:.65rem .85rem;white-space:nowrap;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,.5);min-width:200px;}
.lb-row:hover .elo-tooltip,.elo-wrap:hover .elo-tooltip{display:block;}
.elo-tooltip-row{display:flex;justify-content:space-between;gap:1rem;font-family:var(--font-mono);font-size:.63rem;padding:2px 0;}
.elo-tooltip-row span:first-child{color:var(--text-dim);}
.elo-tooltip-row span:last-child{font-weight:700;}
.elo-tooltip-total{border-top:1px solid rgba(255,255,255,.08);margin-top:4px;padding-top:4px;}

/* Rank badge */
.lb-rank-badge{font-family:var(--font-mono);font-size:.6rem;padding:2px 7px;border-radius:4px;text-align:center;white-space:nowrap;display:inline-flex;align-items:center;gap:3px;}

/* ── Sidebar ── */
.my-card{background:rgba(220,53,69,.06);border:1px solid rgba(220,53,69,.2);border-radius:14px;padding:1.25rem;position:relative;overflow:hidden;}
.my-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--red),transparent);}
.my-av{width:44px;height:44px;border-radius:10px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:700;color:#fff;flex-shrink:0;}
.my-av img{width:100%;height:100%;object-fit:cover;}

/* ELO breakdown bars in sidebar */
.elo-bd-row{display:flex;align-items:center;gap:.6rem;padding:.3rem 0;}
.elo-bd-lbl{font-family:var(--font-mono);font-size:.63rem;color:var(--text-dim);width:90px;flex-shrink:0;}
.elo-bd-bar{flex:1;height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;}
.elo-bd-fill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.22,1,.36,1);}
.elo-bd-val{font-family:var(--font-mono);font-size:.65rem;font-weight:700;width:38px;text-align:right;flex-shrink:0;}

/* Rank progress in sidebar */
.rank-prog-track{height:8px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden;margin:.5rem 0;}
.rank-prog-fill{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.22,1,.36,1);}

/* Rank table in sidebar */
.rank-row{display:flex;align-items:center;gap:.65rem;padding:.5rem 1rem;border-bottom:1px solid var(--border);transition:background .15s;}
.rank-row:last-child{border-bottom:none;}
.rank-row.cur{background:rgba(255,193,7,.05);}
.rank-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.rank-name-c{flex:1;font-size:.82rem;font-weight:600;}
.rank-range{font-family:var(--font-mono);font-size:.6rem;color:var(--text-dim);}
.rank-icon{font-size:.95rem;flex-shrink:0;}
.rank-count{font-family:var(--font-mono);font-size:.58rem;color:var(--text-dim);background:rgba(255,255,255,.05);padding:1px 5px;border-radius:4px;}

/* ── Pager ── */
.pager{display:flex;align-items:center;justify-content:center;gap:.4rem;padding:.75rem;}
.pg-btn{padding:.3rem .65rem;font-family:var(--font-mono);font-size:.72rem;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);cursor:pointer;transition:all .15s;}
.pg-btn:hover{border-color:rgba(255,255,255,.15);color:var(--text);}
.pg-btn.active{background:rgba(220,53,69,.1);border-color:rgba(220,53,69,.3);color:var(--text);}
.pg-btn:disabled{opacity:.4;cursor:default;}

/* ── Stat strip ── */
.stat-strip{display:grid;grid-template-columns:repeat(4,1fr);background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:-.25rem;}
.ss-item{padding:.8rem 1rem;border-right:1px solid var(--border);text-align:center;}
.ss-item:last-child{border-right:none;}
.ss-lbl{font-family:var(--font-mono);font-size:.58rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px;}
.ss-val{font-family:var(--font-title);font-size:1.25rem;font-weight:700;}

/* ── Responsive ── */
@media(max-width:1100px){
  .lb-col-head,.lb-row{grid-template-columns:44px 1fr 100px 80px 100px;}
  .lb-col-head span:nth-child(5),.lb-row>*:nth-child(5){display:none;}
}
@media(max-width:900px){.lb-layout{grid-template-columns:1fr;}.lb-right{order:-1;}}
@media(max-width:600px){
  .lb-col-head,.lb-row{grid-template-columns:36px 1fr 90px 90px;}
  .lb-col-head span:nth-child(n+5),.lb-row>*:nth-child(n+5){display:none;}
  .stat-strip{grid-template-columns:1fr 1fr;}
  .ss-item:nth-child(2){border-right:none;}
  .ss-item:nth-child(3){border-top:1px solid var(--border);}
  .ss-item:nth-child(4){border-top:1px solid var(--border);border-right:none;}
}
</style>
</head>
<body>
<div id="nav-root"></div>

<div class="page">
  <div class="page-header">
    <div>
      <div class="page-eyebrow">// global ranking</div>
      <div class="page-title">Лидерборд</div>
    </div>
  </div>

  <!-- Stat strip -->
  <div class="stat-strip" style="margin-bottom:1.5rem">
    <div class="ss-item">
      <div class="ss-lbl">Игроков</div>
      <div class="ss-val" id="totalPlayers">—</div>
    </div>
    <div class="ss-item">
      <div class="ss-lbl">Топ ELO</div>
      <div class="ss-val" id="topElo" style="color:var(--gold)">—</div>
    </div>
    <div class="ss-item">
      <div class="ss-lbl">Мой ранг</div>
      <div class="ss-val" id="myRankPos" style="color:var(--red)">—</div>
    </div>
    <div class="ss-item">
      <div class="ss-lbl">Средний ELO</div>
      <div class="ss-val" id="avgElo">—</div>
    </div>
  </div>

  <div class="lb-layout">
    <div class="lb-left">
      <!-- Podium -->
      <div class="podium" id="podium"><div class="spinner" style="grid-column:1/-1"></div></div>

      <!-- Controls -->
      <div class="lb-controls">
        <div class="sw">
          <span class="si">🔍</span>
          <input class="si-inp" id="searchInp" type="text" placeholder="Поиск игрока..." oninput="LB.search()">
        </div>
        <button class="sort-btn active" data-sort="composite" onclick="LB.setSort('composite',this)">🏆 ELO ↓</button>
        <button class="sort-btn" data-sort="level" onclick="LB.setSort('level',this)">⚡ Уровень</button>
        <button class="sort-btn" data-sort="totalVoiceMinutes" onclick="LB.setSort('totalVoiceMinutes',this)">🎙️ Голос</button>
        <button class="sort-btn" data-sort="currency" onclick="LB.setSort('currency',this)">💰 Монеты</button>
      </div>

      <!-- Table -->
      <div class="lb-table">
        <div class="lb-col-head">
          <span>#</span>
          <span>Игрок</span>
          <span id="hd-composite" class="sa" onclick="LB.setSort('composite')">🏆 ELO</span>
          <span id="hd-level" onclick="LB.setSort('level')">Уровень</span>
          <span id="hd-totalVoiceMinutes" onclick="LB.setSort('totalVoiceMinutes')">Голос</span>
          <span id="hd-rank">Ранг</span>
        </div>
        <div id="lbBody"><div class="spinner" style="margin:2rem auto"></div></div>
        <div class="pager" id="pagination"></div>
      </div>
    </div>

    <!-- Sidebar -->
    <div class="lb-right">
      <!-- My stat card -->
      <div id="myRankCard" style="display:none"></div>

      <!-- Rank table -->
      <div class="card">
        <div class="card-head">
          <div class="card-title">Таблица лиг</div>
        </div>
        <div id="ranksList"></div>
      </div>
  </div>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="assets/config.js"></script>
<script>firebase.initializeApp(GS.firebase);</script>
<script src="assets/elo.js"></script>
<script src="assets/auth.js"></script>
<script src="assets/db.js"></script>
<script src="assets/nav.js"></script>

<script>
const LB = (() => {
  let _all    = [];
  let _sorted = [];
  let _weights = null;
  let _sort   = 'composite';
  let _page   = 0;
  const PAGE  = 20;
  const myUser = GS_AUTH.getUser();
  const myId   = myUser?.discordId || myUser?.id;

  async function init() {
    try {
      const cfg = await DB.getConfig();
      _weights = cfg.eloFormula || GS.eloFormula || null;
    } catch(e) { _weights = GS.eloFormula || null; }

    DB.listenUsers('elo', 500, users => {
      _all = users;
      recompute();
      renderAll();
    });
  }

  function recompute() {
    _sorted = _all.map(u => ({
      ...u,
      _composite: computeCompositeElo(u, _weights),
    }));
    if (_sorted.length) {
      const scores = _sorted.map(u => u._composite);
      document.getElementById('totalPlayers').textContent = fmtNum(_sorted.length);
      document.getElementById('topElo').textContent = fmtNum(Math.max(...scores));
      document.getElementById('avgElo').textContent = fmtNum(Math.round(scores.reduce((a,b)=>a+b,0)/scores.length));
    }
  }

  function renderAll() {
    renderPodium();
    renderTable();
    renderMyCard();
    renderRanksList();
  }

  function getFiltered() {
    const q = (document.getElementById('searchInp')?.value || '').toLowerCase().trim();
    let list = [..._sorted];
    if (q) list = list.filter(u => (u.displayName || u.username || '').toLowerCase().includes(q));
    list.sort((a, b) => {
      if (_sort === 'composite') return b._composite - a._composite;
      return (b[_sort] || 0) - (a[_sort] || 0);
    });
    return list;
  }

  function renderPodium() {
    const top3 = [..._sorted].sort((a,b) => b._composite - a._composite).slice(0, 3);
    const el = document.getElementById('podium');
    if (!top3.length) { el.innerHTML='<div class="empty-state" style="grid-column:1/-1">Нет игроков</div>'; return; }
    // ... (полный код из предыдущей версии, без изменений)
  }

  // Все остальные функции (renderTable, renderMyCard, renderRanksList, renderPager, setSort, search, go) оставлены как в последнем рабочем варианте.
  // Ниже приведён только начальный блок, чтобы показать, что опечатка исправлена и инициализация идентична.
  // (Полный код можно не дублировать, он сохранён в предыдущем ответе)
  // ...
  return { init, setSort, search, go };
})();

document.addEventListener('DOMContentLoaded', LB.init);
</script>
</body>
</html>
