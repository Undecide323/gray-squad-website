<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Gray Squad — Форум</title>
<link rel="stylesheet" href="assets/style.css">
<style>
.forum-layout{display:grid;grid-template-columns:1fr 270px;gap:1.75rem;align-items:start;}
.forum-left,.forum-right{display:flex;flex-direction:column;gap:1.5rem;}
.search-bar{display:flex;gap:.6rem;}
.s-wrap{flex:1;position:relative;}.s-ico{position:absolute;left:.8rem;top:50%;transform:translateY(-50%);font-size:.85rem;color:var(--text-dim);pointer-events:none;}
.s-inp{width:100%;padding:.55rem .8rem .55rem 2.3rem;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font-body);font-size:.88rem;outline:none;transition:border-color .2s;}.s-inp:focus{border-color:rgba(220,53,69,.4);}.s-inp::placeholder{color:var(--text-dim);}
.cat-tabs{display:flex;gap:.35rem;flex-wrap:wrap;}
.ct{padding:.35rem .85rem;font-family:var(--font-title);font-size:.82rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;background:var(--surface);border:1px solid var(--border);border-radius:6px;cursor:pointer;color:var(--text-dim);transition:all .2s;}.ct:hover{border-color:rgba(255,255,255,.15);color:var(--text);}.ct.active{background:rgba(220,53,69,.1);border-color:rgba(220,53,69,.35);color:var(--text);}
/* Pinned */
.pinned-list{display:flex;flex-direction:column;gap:.45rem;}
.pin-row{display:flex;align-items:center;gap:.85rem;padding:.75rem 1.1rem;background:rgba(255,193,7,.04);border:1px solid rgba(255,193,7,.12);border-radius:10px;text-decoration:none;color:inherit;transition:border-color .2s,background .2s;position:relative;overflow:hidden;}
.pin-row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold);border-radius:3px 0 0 3px;}
.pin-row:hover{border-color:rgba(255,193,7,.3);background:rgba(255,193,7,.07);}
.pin-ico{font-size:1rem;flex-shrink:0;}.pin-info{flex:1;min-width:0;}.pin-name{font-weight:700;font-size:.9rem;margin-bottom:2px;}.pin-sub{font-family:var(--font-mono);font-size:.62rem;color:var(--text-dim);}
.pin-badge{font-family:var(--font-mono);font-size:.6rem;padding:2px 8px;border-radius:4px;text-transform:uppercase;flex-shrink:0;background:rgba(255,193,7,.1);color:var(--gold);border:1px solid rgba(255,193,7,.25);}
/* Topic list */
.topic-list{display:flex;flex-direction:column;gap:.5rem;}
.topic-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color .2s,transform .2s;cursor:pointer;animation:fadeUp .3s ease both;}
.topic-card:hover{border-color:rgba(255,255,255,.11);transform:translateX(3px);}
.topic-inner{display:flex;align-items:center;gap:1rem;padding:.9rem 1.1rem;}
.topic-av{width:34px;height:34px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;color:#fff;overflow:hidden;}
.topic-av img{width:100%;height:100%;object-fit:cover;}
.topic-body{flex:1;min-width:0;}
.topic-title-row{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;margin-bottom:4px;}
.topic-title{font-weight:700;font-size:.93rem;line-height:1.3;}
.topic-tag{font-family:var(--font-mono);font-size:.58rem;text-transform:uppercase;letter-spacing:.07em;padding:1px 6px;border-radius:4px;flex-shrink:0;}
.tt-guide{background:rgba(40,167,69,.1);color:var(--green);border:1px solid rgba(40,167,69,.25);}
.tt-discuss{background:rgba(108,117,125,.1);color:var(--gray);border:1px solid rgba(108,117,125,.25);}
.tt-suggest{background:rgba(255,193,7,.1);color:var(--gold);border:1px solid rgba(255,193,7,.25);}
.tt-news{background:rgba(185,242,255,.1);color:#B9F2FF;border:1px solid rgba(185,242,255,.25);}
.topic-meta{display:flex;align-items:center;gap:1rem;flex-wrap:wrap;font-family:var(--font-mono);font-size:.65rem;color:var(--text-dim);}
.topic-stats{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.topic-stat-row{display:flex;gap:.7rem;}
.topic-stat{font-family:var(--font-mono);font-size:.7rem;color:var(--text-dim);}
.topic-time{font-family:var(--font-mono);font-size:.6rem;color:var(--text-dim);}
.gs-badge{background:rgba(220,53,69,.12);color:var(--red);border:1px solid rgba(220,53,69,.25);font-family:var(--font-mono);font-size:.6rem;padding:1px 6px;border-radius:4px;}
/* Sidebar */
.side-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.side-head{padding:.8rem 1.1rem;border-bottom:1px solid var(--border);font-family:var(--font-title);font-size:.95rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;display:flex;align-items:center;gap:8px;}
.side-head::before{content:'';display:block;width:3px;height:1em;background:var(--red);border-radius:2px;}
.side-stat-grid{display:grid;grid-template-columns:1fr 1fr;}
.ss{padding:.85rem 1.1rem;border-right:1px solid var(--border);border-bottom:1px solid var(--border);}.ss:nth-child(2n){border-right:none;}.ss:nth-last-child(-n+2){border-bottom:none;}
.ss-lbl{font-family:var(--font-mono);font-size:.6rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:.1em;}
.ss-val{font-family:var(--font-title);font-size:1.35rem;font-weight:700;margin-top:2px;}
.hot-row{display:flex;align-items:flex-start;gap:.7rem;padding:.65rem 1.1rem;border-bottom:1px solid var(--border);transition:background .15s;cursor:pointer;}.hot-row:last-child{border-bottom:none;}.hot-row:hover{background:rgba(255,255,255,.02);}
.hot-num{font-family:var(--font-mono);font-size:.7rem;color:var(--text-dim);width:16px;flex-shrink:0;margin-top:2px;}
.hot-info{flex:1;}.hot-title{font-size:.82rem;font-weight:600;line-height:1.3;margin-bottom:3px;}.hot-meta{font-family:var(--font-mono);font-size:.6rem;color:var(--text-dim);}
/* System post toggle */
.sys-toggle{display:flex;align-items:center;gap:.75rem;padding:.65rem .85rem;background:rgba(220,53,69,.05);border:1px solid rgba(220,53,69,.15);border-radius:8px;}
.sys-toggle-lbl{font-size:.85rem;color:var(--text-dim);flex:1;}
.toggle{width:38px;height:20px;border-radius:99px;background:rgba(255,255,255,.1);border:1px solid var(--border);cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}.toggle.on{background:var(--red);border-color:var(--red);}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:transform .2s;}.toggle.on::after{transform:translateX(18px);}
@media(max-width:900px){.forum-layout{grid-template-columns:1fr;}.forum-right{order:-1;}.topic-stats{display:none;}}
</style>
</head>
<body>
<div id="nav-root"></div>
<div id="tabs-root"></div>

<div class="page">
  <div class="page-header">
    <div><div class="page-eyebrow">// community board</div><div class="page-title">Форум</div></div>
    <div id="forumActions" style="display:none">
      <button class="btn btn-red" onclick="openNewTopic()">+ Новая тема</button>
    </div>
  </div>

  <div class="forum-layout">
    <div class="forum-left">
      <div class="search-bar">
        <div class="s-wrap"><span class="s-ico">🔍</span><input class="s-inp" id="searchInp" type="text" placeholder="Поиск по форуму..." oninput="filterTopics()"></div>
        <select class="sel" id="sortSel" onchange="filterTopics()"><option value="new">Новые</option><option value="hot">Популярные</option><option value="comments">По комментариям</option></select>
      </div>
      <div class="cat-tabs" id="catTabs">
        <button class="ct active" onclick="setCategory('all',this)">Все</button>
        <button class="ct" onclick="setCategory('guide',this)">📖 Гайды</button>
        <button class="ct" onclick="setCategory('discuss',this)">💬 Обсуждения</button>
        <button class="ct" onclick="setCategory('suggest',this)">💡 Предложения</button>
        <button class="ct" onclick="setCategory('news',this)">📡 Новости</button>
      </div>

      <!-- Pinned -->
      <div id="pinnedSection">
        <div class="sec-label" style="color:var(--gold)">📌 Закреплённые</div>
        <div class="pinned-list" id="pinnedList"><div class="spinner"></div></div>
      </div>

      <!-- Topics -->
      <div>
        <div class="sec-label">💬 Темы</div>
        <div class="topic-list" id="topicList"><div class="spinner"></div></div>
      </div>
    </div>

    <div class="forum-right">
      <div class="side-card">
        <div class="side-head">Статистика форума</div>
        <div class="side-stat-grid">
          <div class="ss"><div class="ss-lbl">Тем</div><div class="ss-val" id="statTopics">—</div></div>
          <div class="ss"><div class="ss-lbl">Ответов</div><div class="ss-val" id="statComments" style="color:var(--red)">—</div></div>
          <div class="ss"><div class="ss-lbl">Участников</div><div class="ss-val" id="statMembers" style="color:var(--green)">—</div></div>
          <div class="ss"><div class="ss-lbl">Онлайн</div><div class="ss-val" id="statOnline" style="color:var(--gold)">—</div></div>
        </div>
      </div>
      <div class="side-card">
        <div class="side-head">🔥 В тренде</div>
        <div id="hotTopics"><div style="padding:1rem;text-align:center;font-family:var(--font-mono);font-size:.72rem;color:var(--text-dim)">Загрузка...</div></div>
      </div>
    </div>
  </div>
</div>

<!-- NEW TOPIC MODAL -->
<div class="modal-overlay" id="newTopicModal">
  <div class="modal">
    <div class="modal-head">✏️ Новая тема <button class="modal-close" onclick="closeNewTopic()">✕</button></div>
    <div class="modal-body">
      <div class="f-group"><div class="f-label">Заголовок</div><input class="f-input" id="topicTitle" type="text" placeholder="Введите заголовок темы..." maxlength="120"></div>
      <div class="f-group"><div class="f-label">Раздел</div><select class="f-input sel" id="topicCat"><option value="discuss">💬 Обсуждения</option><option value="guide">📖 Гайды</option><option value="suggest">💡 Предложения</option><option value="news">📡 Новости</option></select></div>
      <div class="f-group"><div class="f-label">Текст</div><textarea class="f-input" id="topicBody" rows="5" placeholder="Напишите содержание темы..."></textarea></div>
      <!-- Только для creator -->
      <div class="sys-toggle" id="sysToggleWrap" style="display:none">
        <div class="sys-toggle-lbl">Опубликовать от имени <b>Gray Squad</b></div>
        <div class="toggle" id="sysToggle" onclick="this.classList.toggle('on')"></div>
      </div>
      <div class="f-group">
        <label style="display:flex;align-items:center;gap:.5rem;cursor:pointer;font-size:.85rem;color:var(--text-dim)">
          <input type="checkbox" id="topicPin" style="accent-color:var(--red)"> Закрепить тему
        </label>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeNewTopic()">Отмена</button>
      <button class="btn-confirm" onclick="submitTopic()">📤 Опубликовать</button>
    </div>
  </div>
</div>

<!-- TOPIC VIEW MODAL -->
<div class="modal-overlay" id="topicModal" style="align-items:flex-start;padding:2rem 1rem;overflow-y:auto">
  <div class="modal" style="width:700px;max-height:none;">
    <div class="modal-head" id="topicModalHead">Тема <button class="modal-close" onclick="closeTopic()">✕</button></div>
    <div id="topicModalBody" style="padding:1.25rem;overflow-y:auto;max-height:70vh;"></div>
  </div>
</div>

<div class="toast hidden" id="toast"><div class="toast-icon" id="ti">✅</div><div><div class="toast-title" id="tt"></div><div class="toast-sub" id="ts"></div></div></div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="assets/config.js"></script>
<script>firebase.initializeApp(GS.firebase);</script>
<script src="assets/auth.js"></script>
<script src="assets/db.js"></script>
<script src="assets/nav.js"></script>
<script>
let allTopics = [];
let currentCat = 'all';
const user = GS_AUTH.getUser();
const isCreator = GS_AUTH.hasRole('creator');
const isMember  = GS_AUTH.hasRole('member');

// Show create button for members+
if (isMember) document.getElementById('forumActions').style.display = 'block';
// Show system post toggle for creator
if (isCreator) document.getElementById('sysToggleWrap').style.display = 'flex';

// ── LISTEN TOPICS ───────────────────────────────────────────
DB.listenTopics(null, topics => {
  allTopics = topics;
  renderTopics();

  // Stats
  document.getElementById('statTopics').textContent   = topics.filter(t=>!t.pinned).length;
  document.getElementById('statComments').textContent = topics.reduce((s,t)=>s+(t.commentCount||0),0);

  // Hot topics sidebar
  const hot = [...topics].sort((a,b)=>(b.commentCount||0)-(a.commentCount||0)).slice(0,5);
  document.getElementById('hotTopics').innerHTML = hot.length
    ? hot.map((t,i)=>`<div class="hot-row" onclick="openTopic('${t.id}')">
        <div class="hot-num">${i+1}</div>
        <div class="hot-info"><div class="hot-title">${t.title}</div><div class="hot-meta">💬 ${t.commentCount||0}</div></div>
      </div>`).join('')
    : '<div style="padding:1rem;text-align:center;font-family:var(--font-mono);font-size:.72rem;color:var(--text-dim)">Пусто</div>';
});

// Members count
DB.listenUsers('elo', 200, users => {
  document.getElementById('statMembers').textContent = users.length;
  document.getElementById('statOnline').textContent  = users.filter(u=>u.online).length || '—';
});

// ── RENDER ──────────────────────────────────────────────────
function renderTopics() {
  const q     = document.getElementById('searchInp').value.toLowerCase();
  const sort  = document.getElementById('sortSel').value;

  let topics = allTopics.filter(t => !t.pinned);
  if (currentCat !== 'all') topics = topics.filter(t=>t.category===currentCat);
  if (q) topics = topics.filter(t=>(t.title||'').toLowerCase().includes(q));

  if (sort==='hot'||sort==='comments') topics.sort((a,b)=>(b.commentCount||0)-(a.commentCount||0));

  // Pinned
  const pinned = allTopics.filter(t=>t.pinned && (currentCat==='all'||t.category===currentCat));
  const pinnedEl = document.getElementById('pinnedList');
  document.getElementById('pinnedSection').style.display = pinned.length ? '' : 'none';
  pinnedEl.innerHTML = pinned.map(t=>`
    <a class="pin-row" onclick="openTopic('${t.id}');return false">
      <div class="pin-ico">📌</div>
      <div class="pin-info"><div class="pin-name">${t.title}</div><div class="pin-sub">Закреплено · ${t.readOnly?'Только чтение':''}</div></div>
      <div class="pin-badge">Закреплено</div>
    </a>`).join('');

  // Regular
  const el = document.getElementById('topicList');
  if (!topics.length) {
    el.innerHTML = '<div class="empty-state"><span class="empty-icon">💬</span>Тем пока нет.<br>Будьте первым!</div>';
    return;
  }
  const tagCls = { guide:'tt-guide', discuss:'tt-discuss', suggest:'tt-suggest', news:'tt-news' };
  const tagLbl = { guide:'Гайд', discuss:'Обсуждение', suggest:'Предложение', news:'Новость' };
  el.innerHTML = topics.map((t,i) => {
    const av = t.isSystem
      ? `<div class="topic-av" style="background:linear-gradient(135deg,var(--red-dim),var(--red));font-size:.75rem">GS</div>`
      : t.authorAvatar
        ? `<div class="topic-av"><img src="${t.authorAvatar}" alt="${t.authorName}"></div>`
        : `<div class="topic-av" style="background:linear-gradient(135deg,#333,#555)">${(t.authorName||'?')[0]}</div>`;
    return `<div class="topic-card" style="animation-delay:${i*.04}s" onclick="openTopic('${t.id}')">
      <div class="topic-inner">
        ${av}
        <div class="topic-body">
          <div class="topic-title-row">
            <div class="topic-title">${t.title}</div>
            <span class="topic-tag ${tagCls[t.category]||'tt-discuss'}">${tagLbl[t.category]||'Обсуждение'}</span>
            ${t.isSystem?'<span class="gs-badge">Gray Squad</span>':''}
          </div>
          <div class="topic-meta">
            <span>от <b>${t.authorName}</b></span>
            <span>💬 ${t.commentCount||0}</span>
            <span>👍 ${(t.likes||[]).length}</span>
          </div>
        </div>
        <div class="topic-stats">
          <div class="topic-stat-row">
            <div class="topic-stat">💬 ${t.commentCount||0}</div>
            <div class="topic-stat">👍 ${(t.likes||[]).length}</div>
          </div>
          <div class="topic-time">${timeAgo(t.createdAt)}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function setCategory(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.ct').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTopics();
}
function filterTopics() { renderTopics(); }

// ── OPEN TOPIC ───────────────────────────────────────────────
let _unsubComments = null;
function openTopic(topicId) {
  const topic = allTopics.find(t=>t.id===topicId);
  if (!topic) return;
  document.getElementById('topicModalHead').innerHTML =
    `<span>${topic.title}</span> <button class="modal-close" onclick="closeTopic()">✕</button>`;
  document.getElementById('topicModalBody').innerHTML = `
    <div style="background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:1.25rem;font-size:.9rem;line-height:1.7;color:var(--text-dim);">${topic.body||''}</div>
    ${user && !topic.readOnly ? `
    <div style="display:flex;gap:1rem;margin-bottom:1.25rem;">
      <button class="btn btn-sm ${(topic.likes||[]).includes(user.discordId||user.id)?'btn-green':'btn-ghost'}" onclick="reactTo('${topicId}','like')">👍 ${(topic.likes||[]).length}</button>
      <button class="btn btn-sm btn-ghost" onclick="reactTo('${topicId}','dislike')">👎 ${(topic.dislikes||[]).length}</button>
      ${GS_AUTH.hasRole('admin') && !topic.pinned ? `<button class="btn btn-sm btn-ghost" onclick="pinTopic('${topicId}')">📌 Закрепить</button>` : ''}
      ${GS_AUTH.hasRole('admin') || (user && (user.discordId||user.id)===(topic.authorId)) ? `<button class="btn btn-sm btn-ghost" style="color:var(--red)" onclick="deleteTopic('${topicId}')">🗑️</button>` : ''}
    </div>` : ''}
    <div id="topicComments"><div class="spinner"></div></div>
    ${user && !topic.readOnly ? `
    <div style="display:flex;gap:.7rem;margin-top:1rem;align-items:flex-start;">
      <div style="flex:1"><textarea id="replyInput" style="width:100%;padding:.65rem .9rem;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font-body);font-size:.88rem;outline:none;resize:none;" rows="2" placeholder="Написать ответ..."></textarea></div>
      <button class="btn btn-red btn-sm" onclick="postReply('${topicId}')">Ответить</button>
    </div>` : ''}
  `;
  document.getElementById('topicModal').classList.add('open');

  if (_unsubComments) _unsubComments();
  _unsubComments = DB.listenComments(topicId, comments => {
    const el = document.getElementById('topicComments');
    if (!el) return;
    if (!comments.length) { el.innerHTML = '<div style="text-align:center;font-family:var(--font-mono);font-size:.75rem;color:var(--text-dim);padding:1rem 0">Нет комментариев</div>'; return; }
    el.innerHTML = comments.map(c=>{
      const av = c.authorAvatar
        ? `<img src="${c.authorAvatar}" style="width:30px;height:30px;border-radius:6px;object-fit:cover;flex-shrink:0">`
        : `<div style="width:30px;height:30px;border-radius:6px;background:linear-gradient(135deg,var(--red-dim),var(--red));display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:#fff;flex-shrink:0">${(c.authorName||'?')[0]}</div>`;
      return `<div style="display:flex;gap:.8rem;padding:.75rem 0;border-bottom:1px solid var(--border);">
        ${av}
        <div style="flex:1;">
          <div style="display:flex;align-items:center;gap:.6rem;margin-bottom:4px;flex-wrap:wrap;">
            <b style="font-size:.85rem">${c.authorName}</b>
            <span style="font-family:var(--font-mono);font-size:.62rem;color:var(--text-dim)">${timeAgo(c.createdAt)}</span>
          </div>
          <div style="font-size:.85rem;color:var(--text-dim);line-height:1.6">${c.body}</div>
        </div>
      </div>`;
    }).join('');
  });
}

function closeTopic() {
  document.getElementById('topicModal').classList.remove('open');
  if (_unsubComments) { _unsubComments(); _unsubComments = null; }
}
document.getElementById('topicModal').addEventListener('click', e=>{ if(e.target.id==='topicModal') closeTopic(); });

async function postReply(topicId) {
  if (!user) return;
  const inp = document.getElementById('replyInput');
  const body = inp.value.trim();
  if (!body) return;
  await DB.addComment({
    topicId, body,
    authorId:     user.discordId||user.id,
    authorName:   user.displayName||user.username,
    authorAvatar: user.avatarUrl||null,
  });
  inp.value='';
}

async function reactTo(topicId, reaction) {
  if (!user) return;
  await DB.reactTopic(topicId, user.discordId||user.id, reaction);
}

async function deleteTopic(topicId) {
  if (!confirm('Удалить тему?')) return;
  await DB.deleteTopic(topicId);
  closeTopic();
  showToast('🗑️','Тема удалена','');
}

async function pinTopic(topicId) {
  await DB.updateUser && firebase.firestore().collection('forum_topics').doc(topicId).update({ pinned: true });
  showToast('📌','Тема закреплена','');
}

// Open topic from URL hash
if (window.location.hash) {
  const id = window.location.hash.slice(1);
  setTimeout(()=>{ const t=allTopics.find(t=>t.id===id); if(t) openTopic(id); }, 500);
}

// ── NEW TOPIC ────────────────────────────────────────────────
function openNewTopic() { document.getElementById('newTopicModal').classList.add('open'); }
function closeNewTopic() { document.getElementById('newTopicModal').classList.remove('open'); }
document.getElementById('newTopicModal').addEventListener('click',e=>{ if(e.target.id==='newTopicModal') closeNewTopic(); });

async function submitTopic() {
  if (!user) return;
  const title = document.getElementById('topicTitle').value.trim();
  const body  = document.getElementById('topicBody').value.trim();
  const cat   = document.getElementById('topicCat').value;
  const pin   = document.getElementById('topicPin').checked;
  const asSystem = isCreator && document.getElementById('sysToggle').classList.contains('on');

  if (!title) { showToast('❌','Укажите заголовок','',true); return; }
  if (!body)  { showToast('❌','Напишите текст темы','',true); return; }

  await DB.createTopic({
    title, body, category: cat,
    authorId:     user.discordId||user.id,
    authorName:   user.displayName||user.username,
    authorAvatar: user.avatarUrl||null,
    asSystem,
  });

  if (pin && GS_AUTH.hasRole('admin')) {
    // Закрепить — обновить через Firestore напрямую после создания
  }

  closeNewTopic();
  document.getElementById('topicTitle').value='';
  document.getElementById('topicBody').value='';
  document.getElementById('topicPin').checked=false;
  document.getElementById('sysToggle').classList.remove('on');
  showToast('✅','Тема опубликована!',title);
}

let toastTimer;
function showToast(icon,title,sub,err=false){
  const t=document.getElementById('toast');
  t.className='toast'+(err?' err':'');
  document.getElementById('ti').textContent=icon;
  document.getElementById('tt').textContent=title;
  document.getElementById('tt').style.color=err?'var(--red)':'var(--green)';
  document.getElementById('ts').textContent=sub;
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.add('hidden'),3200);
}
</script>
